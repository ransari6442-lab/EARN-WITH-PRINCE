<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VIP FLEX</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">

  <!-- Meta Pixel Code -->
  <script>
    !function(f,b,e,v,n,t,s)
    {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};
    if(!f._fbq)f._fbq=n;
    n.push=n;n.loaded=!0;n.version='2.0';
    n.queue=[];
    t=b.createElement(e);t.async=!0;

    s.parentNode.insertBefore(t,s)}

    /* REPLACE WITH YOUR PIXEL ID */
    fbq('init', '123456789012345');

  <noscript>
    <img height="1" width="1" style="display:none"
    src="https://www.facebook.com/tr?id=123456789012345&ev=PageView&noscript=1"/>
  </noscript>
  <!-- End Meta Pixel Code -->

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body{
      background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
    }

    .container{
      background:#fff;
      padding:40px 25px;
      border-radius:20px;
      text-align:center;
      box-shadow:0 15px 40px rgba(0,0,0,.35);
      max-width:400px;
      width:100%;
    }

    .title{
      font-size:38px;
      font-weight:900;
      color:#00c853;
      margin-bottom:25px;
      text-transform:uppercase;
      letter-spacing:3px;
      text-shadow:
        3px 3px 0 #000,
        6px 6px 10px rgba(0,0,0,0.6);
    }

    .logo{
      width:100px;
      height:100px;
      border-radius:50%;
      object-fit:cover;
      border:4px solid #00c853;
      margin-bottom:25px;
    }

    .subscribe-btn{
      display:inline-block;
      padding:16px 35px;
      background:linear-gradient(135deg,#00c853,#00e676);
      color:#fff;
      text-decoration:none;
      font-size:20px;
      font-weight:700;
      border-radius:12px;
      animation:pulse 1.5s infinite;
      transition:0.3s;
    }

    .subscribe-btn:hover{
      transform:scale(1.05);
    }

    @keyframes pulse{
      0%{box-shadow:0 0 0 0 rgba(0,200,83,.6)}
      70%{box-shadow:0 0 0 15px rgba(0,200,83,0)}
      100%{box-shadow:0 0 0 0 rgba(0,200,83,0)}
    }
  </style>
</head>
<body>

  <div class="container">

    <div class="title">VIP FLEX 🚀</div>

    <img 
      src="https://i.ibb.co/4wY6NmwT/Whats-App-Image-2026-03-17-at-9-45-02-PM.jpg" 
      class="logo"
      alt="VIP FLEX Logo"
    >

    <a href="https://t.me/+ZTmt3rvmgLc5OWRl"
       target="_blank"
       class="subscribe-btn"
       onclick="trackSubscribe()">
       🔔 Subscribe
    </a>

  </div>

  <script>
    function trackSubscribe() {

      // Track button click
      fbq('track', 'Subscribe');

      // Optional custom event
      fbq('trackCustom', 'TelegramSubscribeClick');

      console.log("Subscribe button clicked");
    }
  </script>

</body>
</html>
